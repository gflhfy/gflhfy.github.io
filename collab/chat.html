<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GFL HFY Collab Chat</title>
    <link rel="stylesheet" href="chat.css?v=20260710f">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="app-shell" data-mobile-tab="login">
      <nav class="mobile-tabs" aria-label="Views">
        <button type="button" class="mobile-tab is-active" data-tab="login" data-i18n="tabLogin">Login</button>
        <button type="button" class="mobile-tab" data-tab="chat" data-i18n="tabChat">Chat</button>
        <button type="button" class="mobile-tab" data-tab="files" data-i18n="tabFiles">Files</button>
      </nav>

      <section id="panel-login" class="login-panel mobile-panel" data-panel="login" aria-label="Login">
        <div class="setup">
          <label>
            <span data-i18n="yourLanguage">Your language</span>
            <select id="language"></select>
          </label>
          <label>
            <span data-i18n="name">Name</span>
            <input id="author" type="text" autocomplete="nickname" maxlength="80" data-i18n-placeholder="namePlaceholder" placeholder="Your name">
          </label>
          <label>
            <span data-i18n="room">Room</span>
            <select id="room" disabled>
              <option value="" data-i18n="loadingRooms">Loading rooms...</option>
            </select>
          </label>
          <label class="password-field">
            <span data-i18n="roomPassword">Room password</span>
            <input id="password" type="password" autocomplete="current-password">
          </label>
          <button id="connect" type="button" data-i18n="connect">Connect</button>
        </div>
      </section>

      <main id="panel-chat" class="chat-panel mobile-panel" data-panel="chat" aria-label="Chat">
        <section class="status-row" aria-live="polite">
          <span id="status" data-i18n="notConnected">Not connected.</span>
          <span id="users"></span>
        </section>

        <section id="messages" class="messages" aria-label="Messages"></section>

        <form id="composer" class="composer">
          <textarea id="message" rows="3" maxlength="1000" data-i18n-placeholder="messagePlaceholder" placeholder="Write a message..." disabled></textarea>
          <div class="composer-actions">
            <button id="send" type="submit" data-i18n="send" disabled>Send</button>
            <button id="emoji" type="button" data-i18n-aria="emoji" title="Emoji" aria-label="Emoji" aria-expanded="false" aria-controls="emoji-popover" disabled>😀</button>
          </div>
          <div id="emoji-popover" class="emoji-popover" hidden></div>
        </form>
      </main>

      <div id="splitter" class="splitter" role="separator" aria-orientation="vertical" aria-label="Resize panels" tabindex="0"></div>

      <aside id="panel-files" class="files-panel mobile-panel" data-panel="files" aria-label="Room files">
        <section id="files-browser" class="files-browser">
          <div class="files-toolbar">
            <span class="files-heading" data-i18n="filesHeading">Files</span>
            <button id="files-refresh" type="button" data-i18n="refreshFiles">Refresh</button>
          </div>
          <div class="audio-player-wrap">
            <div id="audio-title" class="audio-title" data-i18n="noAudio">No audio selected</div>
            <audio id="audio-player" controls preload="metadata"></audio>
          </div>
          <div id="file-list" class="file-list">
            <div class="files-empty" data-i18n="connectForFiles">Connect to a room to see files.</div>
          </div>
        </section>

        <section id="text-viewer" class="text-viewer hidden">
          <div class="viewer-toolbar">
            <button id="viewer-back" type="button" data-i18n="back">Back</button>
            <h2 id="viewer-title"></h2>
            <div class="viewer-actions">
              <span id="viewer-badge" class="viewer-badge hidden" data-i18n="editedBadge">Edited</span>
              <button id="viewer-edit" type="button" class="secondary" data-i18n="edit">Edit</button>
              <button id="viewer-save" type="button" class="hidden" data-i18n="save">Save</button>
              <button id="viewer-cancel" type="button" class="secondary hidden" data-i18n="cancel">Cancel</button>
              <button id="viewer-revert" type="button" class="danger hidden" data-i18n="revert">Revert</button>
            </div>
          </div>
          <div class="viewer-content">
            <article id="viewer-body" class="viewer-body"></article>
            <textarea id="viewer-editor" class="viewer-editor hidden" spellcheck="true"></textarea>
          </div>
        </section>
      </aside>
    </div>
    <script src="chat.js?v=20260710f"></script>
  </body>
</html>

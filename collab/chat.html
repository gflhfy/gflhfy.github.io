<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GFL HFY Collab Chat</title>
    <link rel="stylesheet" href="chat.css">
  </head>
  <body>
    <main class="chat-shell">
      <section class="setup" aria-label="Chat settings">
        <label>
          <span data-i18n="yourLanguage">Your language</span>
          <select id="language"></select>
        </label>
        <label>
          <span data-i18n="name">Name</span>
          <input id="author" type="text" autocomplete="nickname" maxlength="80" data-i18n-placeholder="namePlaceholder" placeholder="Your name">
        </label>
        <label>
          <span data-i18n="room">Room</span>
          <select id="room" disabled>
            <option value="" data-i18n="loadingRooms">Loading rooms...</option>
          </select>
        </label>
        <label class="password-field">
          <span data-i18n="roomPassword">Room password</span>
          <input id="password" type="password" autocomplete="current-password">
        </label>
        <button id="connect" type="button" data-i18n="connect">Connect</button>
      </section>

      <section class="status-row" aria-live="polite">
        <span id="status" data-i18n="notConnected">Not connected.</span>
        <span id="users"></span>
      </section>

      <section id="messages" class="messages" aria-label="Messages"></section>

      <form id="composer" class="composer">
        <textarea id="message" rows="3" maxlength="1000" data-i18n-placeholder="messagePlaceholder" placeholder="Write a message..." disabled></textarea>
        <button id="send" type="submit" data-i18n="send" disabled>Send</button>
      </form>
    </main>
    <script src="chat.js"></script>
  </body>
</html>
